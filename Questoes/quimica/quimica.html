<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/Questoes/matematica.css">
    <title>Química</title>
</head>
<body>

    <div class="comeco">
        <div class="numerador">1.</div>

        <h1 class="pergunta" id="pergunta"></h1>
    </div>

    <div class="botoes">

        <ul>
        
            <button onclick="responder(0)" class= "botao" id="bt1"></button>

            <button onclick="responder(1)" class= "botao" id="bt2"></button>

            <button onclick="responder(2)" class= "botao" id="bt3"></button>

            <button onclick="responder(3)" class= "botao" id="bt4"></button>

        </ul>
        

    </div>

    <div>
        <p class="credito">@CREATED BY ALGUÉM</p>
    </div>

    <script>
        const perguntas = [

            {
                pergunta: " Qual é o elemento químico mais abundante no universo?",
                respostas: [
                    "Oxigênio",
                    "Carbono",
                    "Hidrogênio",
                    "Hélio"
                ],
                correta: 2
            },

            {
                pergunta: " Qual gás é liberado na fotossíntese? ",
                respostas: [
                    " Dióxido de carbono",
                    "Oxigênio",
                    "Nitrogênio",
                    " Hidrogênio"
                ],
                correta: 1
            },

            {
                pergunta: "Qual é o pH de uma solução neutra a 25°C?",
                respostas: [
                    "0",
                    "5",
                    "7",
                    "14",
                ],
                correta: 2
            },

            {
                pergunta: "Qual metal é líquido à temperatura ambiente?",
                respostas: [
                    "Sódio",
                    "Mercúrio",
                    "Gálio",
                    "Césio",
                ],
                correta: 1
            },

            {
                pergunta: " Qual é a fórmula química da água oxigenada?",
                respostas: [
                    "H₂O",
                    "H₂O₂",
                    "HO₂",
                    "H₃O",
                ],
                correta: 1
            },

            {
                pergunta: "Quem propôs o modelo atômico em que os elétrons orbitam o núcleo em níveis de energia definidos?",
                respostas: [
                    "Rutherford",
                    "Thomson",
                    "Bohr",
                    "Dalton",
                ],

                correta: 2
            },

            {
                pergunta: " Qual desses elementos é um gás nobre? ",
                respostas: [
                  "Cloro",
                  "Neônio",
                  "Enxofre",
                    "Fósforo",
                ],

                correta: 1
            },

            {
                pergunta: "O que caracteriza uma reação exotérmica?",
                respostas: [
                    "Absorve calor do ambiente",
                    " Libera calor para o ambiente",
                    " Sem variação de energia",
                    " Ocorre apenas em meio aquoso",
                ],

                correta: 1
            },

            
            {
                pergunta: "Qual é a unidade de medida usada para expressar a concentração molar (mol/L)?",
                respostas: [
                    "Normalidade",
                    "Molaridade",
                    "Molalidade",
                    "Densidade",
                ],

                correta: 1
            },

            {
                pergunta: " Qual desses é um exemplo de ligação iônica?",
                respostas: [
                    "O₂",
                    "NaCl",
                    "H₂O",
                    "CH₄",
                ],

                correta: 1
            },

            
        ];


        let perguntaAtual = 0;

    function carregarPergunta() {

      document.getElementById("pergunta").innerText =
        perguntas[perguntaAtual].pergunta;

      document.getElementById("bt1").innerText =
        perguntas[perguntaAtual].respostas[0];

      document.getElementById("bt2").innerText =
        perguntas[perguntaAtual].respostas[1];

      document.getElementById("bt3").innerText =
        perguntas[perguntaAtual].respostas[2];

      document.getElementById("bt4").innerText =
        perguntas[perguntaAtual].respostas[3];

      document.querySelector(".numerador").innerText =
        (perguntaAtual + 1) + ".";
    }

    function responder(opcao) {

      if (opcao === perguntas[perguntaAtual].correta) {

        perguntaAtual++;

        if (perguntaAtual < perguntas.length) {

          carregarPergunta();

        } else {

          window.location.href = "parabens.html";

        }

      } else {

        window.location.href = "erro.html";

      }

    }

    carregarPergunta();
    </script>

</body>
</html>
