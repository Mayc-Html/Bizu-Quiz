<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAI DAQUI!</title>
    <link rel="stylesheet" href="easter.css">
</head>
<body>

    <div class="container-easter">
        <img class="imagem-curioso" src="WhatsApp Image 2026-07-14 at 08.18.54.jpeg" alt="Curioso">
        
        <h1 class="texto-curioso">SAI DAQUI CURIOSO!</h1>
     
        <button class="botao-genio" type="button" onclick="window.location.href='index.html'">Voltar</button>
    </div>

    <!-- Áudios -->
    <audio id="efeito" src="../songs/23- Gota.mp3"></audio>
    

   <audio id="musica" src="../songs/WhatsApp Audio 2026-07-14 at 11.04.58 (1).mpeg" loop autoplay muted></audio>

    <script>
        const musica = document.getElementById("musica");

        // Tenta tocar com som imediatamente (caso o navegador do usuário permita)
        musica.play().catch(error => {
            console.log("Navegador bloqueou som com volume. Rodando mutado até o primeiro clique.");
        });

        // Assim que o usuário fizer QUALQUER interação, nós ativamos o volume
        function ativarVolume() {
            musica.muted = false; // Desmuta a música
            musica.play();        // Garante que está tocando
            
            // Remove os eventos para não ficar rodando toda hora
            document.removeEventListener('click', ativarVolume);
            document.removeEventListener('keydown', ativarVolume);
        }

        // Fica de olho no primeiro movimento do usuário para liberar o som
        document.addEventListener('click', ativarVolume);
        document.addEventListener('keydown', ativarVolume);
    </script>
</body>
</html>
