<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genio quiz</title>
    <link rel="stylesheet" href="style-bruno.css">
</head>

<body>
    <div class="botoes">
        <button class="botao" onclick="window.location.href='escolhas-maycol/escolha_materias.html'">
            Começar
        </button>
        <button class="botao" onclick="window.location.href='tutorial-matheus/tutorial.html'">
            Tutorial
        </button>
        <button class="botao" onclick="window.location.href='../creditos/credito.html'">
            Bizurados
        </button>
    </div>

    <h2 class="created-by">@Create by Bizurados☝️🥸</h2>

    <!-- Adicionamos "autoplay" e "muted" para forçar o navegador a aceitar o início automático -->
    <audio id="musica" src="../songs/Naruto - Konohamaru's Theme (128 kbps).mp3" loop autoplay muted></audio>

    <script>
        const musica = document.getElementById("musica");

        // Tenta tocar com som imediatamente (caso o navegador do usuário permita)
        musica.play().catch(error => {
            console.log("Navegador bloqueou som com volume. Rodando mutado até o primeiro clique.");
        });

        // Assim que o usuário fizer QUALQUER interação, nós ativamos o volume
        function ativarVolume() {
            musica.muted = false; // Desmuta a música
            musica.play();        // Garante que está tocando
            
            // Remove os eventos para não ficar rodando toda hora
            document.removeEventListener('click', ativarVolume);
            document.removeEventListener('keydown', ativarVolume);
        }

        // Fica de olho no primeiro movimento do usuário para liberar o som
        document.addEventListener('click', ativarVolume);
        document.addEventListener('keydown', ativarVolume);
    </script>

    <!-- Botão de Easter Egg -->
    <button class="easter" onclick="window.location.href='esateregg.html'"> </button>
</body>

</html>
